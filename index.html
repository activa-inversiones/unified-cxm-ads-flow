<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activa Elite - Command Center v4.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .live-pulse { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-gray-950 to-black overflow-x-hidden">

    <nav class="glass sticky top-0 z-50 p-6 border-b border-cyan-500/20">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-5">
                <div class="bg-gradient-to-br from-cyan-600 to-blue-600 text-white w-14 h-14 flex items-center justify-center rounded-2xl font-black text-3xl shadow-2xl shadow-cyan-500/20">A</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase italic text-white">Activa <span class="text-cyan-400 font-light text-sm">Elite v4.3</span></h1>
                    <div class="flex items-center gap-2">
                        <span class="live-pulse"></span>
                        <span class="text-[10px] font-bold text-green-400 uppercase tracking-[0.2em]">SISTEMA LIVE: ARAUCANÍA</span>
                    </div>
                </div>
            </div>
            <button onclick="window.location.reload()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-8 py-3 rounded-full text-[10px] font-black tracking-widest uppercase transition-all shadow-xl active:scale-95">RE-SYNC DATA</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-10 space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 text-center">
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-cyan-500"><p class="text-[10px] font-black text-slate-500 uppercase mb-2">Leads</p><h4 class="text-5xl font-black text-white italic">142</h4></div>
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-blue-500"><p class="text-[10px] font-black text-slate-500 uppercase mb-2">VIP</p><h4 class="text-5xl font-black text-blue-400 italic">38</h4></div>
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-purple-500"><p class="text-[10px] font-black text-slate-500 uppercase mb-2">ROI</p><h4 class="text-5xl font-black text-purple-400 italic">14.2x</h4></div>
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-emerald-500"><p class="text-[10px] font-black text-slate-500 uppercase mb-2">Zoho</p><h4 class="text-2xl font-black text-emerald-400 uppercase italic">ONLINE</h4></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass p-10 rounded-[3.5rem]"><canvas id="mainChart" class="h-64"></canvas></div>
            <div class="glass p-10 rounded-[3.5rem] flex items-center justify-center"><canvas id="pieChart" class="h-56 w-56"></canvas></div>
        </div>

        <section class="glass p-10 rounded-[4rem] bg-gradient-to-br from-gray-950 to-black border border-white/5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
                <div>
                    <h3 class="text-5xl font-black mb-6 text-white uppercase italic tracking-tighter">Control Center</h3>
                    <p class="text-slate-400 text-sm mb-8">Motor Elite v4.3 operando con Token Permanente de System User.</p>
                </div>
                <div class="bg-black/90 p-8 rounded-[2.5rem] border border-cyan-500/20 mono text-[11px] h-40 overflow-y-auto custom-scrollbar" id="terminal">
                    <p class="text-emerald-400">>>> [SYSTEM] Activa Elite v4.3 online...</p>
                    <p class="text-cyan-400 animate-pulse">>>> [WAITING] Esperando el próximo lead para Zoho CRM...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        Chart.defaults.color = '#64748b';
        // Gráfico de Línea
        new Chart(document.getElementById('mainChart'), { 
            type: 'line', 
            data: { 
                labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'], 
                datasets: [{ 
                    data: [18, 24, 21, 45, 32, 58, 72], 
                    borderColor: '#06b6d4', 
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(6, 182, 212, 0.1)'
                }] 
            }, 
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } 
        });
        // Gráfico de Dona
        new Chart(document.getElementById('pieChart'), { 
            type: 'doughnut', 
            data: { 
                labels: ['VIP', 'General'], 
                datasets: [{ 
                    data: [38, 104], 
                    backgroundColor: ['#06b6d4', '#1e293b'], 
                    borderWidth: 0 
                }] 
            }, 
            options: { responsive: true, maintainAspectRatio: false, cutout: '85%', plugins: { legend: { display: false } } } 
        });
    </script>
</body>
</html>
