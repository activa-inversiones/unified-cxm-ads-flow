<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activa Elite - Command Center Omnicanal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .btn-active { background-color: rgba(6, 182, 212, 0.2); border-color: #06b6d4; color: #22d3ee; }
        .btn-inactive { background-color: rgba(255, 255, 255, 0.05); border-color: transparent; color: #94a3b8; }
    </style>
</head>
<body class="p-6 md:p-10 bg-slate-950 min-h-screen flex flex-col">
    
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-white/10 pb-6 gap-4">
        <div>
            <h1 class="text-3xl font-black uppercase tracking-tighter italic text-white">Activa <span class="text-cyan-400">Elite v5.2</span></h1>
            <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Infraestructura Modular Omnicanal</p>
        </div>
        
        <div class="flex gap-2 bg-slate-900 p-2 rounded-2xl border border-white/5">
            <button id="btn-ads" onclick="cambiarVista('ads')" class="btn-inactive px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all hover:opacity-80">1. Meta + TikTok</button>
            <button id="btn-radar" onclick="cambiarVista('radar')" class="btn-inactive px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all hover:opacity-80">2. Radar Temuco</button>
            <button id="btn-dual" onclick="cambiarVista('dual')" class="btn-active px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all hover:opacity-80">Vista Dual</button>
        </div>
    </header>

    <main id="main-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-10 flex-grow">
        
        <section id="modulo-ads" class="glass p-8 rounded-[3rem] border-t-4 border-cyan-500">
            <h2 class="text-2xl font-black italic text-cyan-400 mb-6 uppercase tracking-tighter flex items-center justify-between gap-3">
                <span class="flex items-center gap-3"><span class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse"></span> Motor 1: Meta + TikTok Ads</span>
                <span class="text-[10px] text-slate-500 uppercase tracking-widest border border-slate-700 px-3 py-1 rounded-full">Tráfico Combinado</span>
            </h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Leads Capturados</p>
                    <p class="text-4xl font-black text-white italic">28</p>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Estado Webhooks</p>
                    <p class="text-2xl font-black text-cyan-400 uppercase mt-2">Doble Vía OK</p>
                </div>
            </div>
            <div class="h-64">
                <canvas id="adsChart"></canvas>
            </div>
        </section>

        <section id="modulo-radar" class="glass p-8 rounded-[3rem] border-t-4 border-purple-500">
            <h2 class="text-2xl font-black italic text-purple-400 mb-6 uppercase tracking-tighter flex items-center justify-between gap-3">
                <span class="flex items-center gap-3"><span class="w-3 h-3 rounded-full bg-purple-400 animate-pulse"></span> Motor 2: Radar Temuco</span>
                <span class="text-[10px] text-slate-500 uppercase tracking-widest border border-slate-700 px-3 py-1 rounded-full">Scraping DOM</span>
            </h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Obras (Zoho CRM)</p>
                    <p class="text-4xl font-black text-white italic">44</p>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">M² Detectados</p>
                    <p class="text-2xl font-black text-purple-400 mt-2">7.920 m²</p>
                </div>
            </div>
            <div class="h-64">
                <canvas id="temucoChart"></canvas>
            </div>
        </section>

    </main>

    <script>
        Chart.defaults.color = '#64748b';
        Chart.defaults.font.family = "'Inter', sans-serif";

        // Gráfico OMNICANAL: Doble línea para comparar Meta vs TikTok
        const chartAds = new Chart(document.getElementById('adsChart'), {
            type: 'line',
            data: { 
                labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie'], 
                datasets: [
                    { label: 'Meta Ads', data: [2, 5, 3, 8, 12], borderColor: '#06b6d4', backgroundColor: 'rgba(6, 182, 212, 0.1)', fill: true, tension: 0.4 },
                    { label: 'TikTok Ads', data: [0, 2, 5, 6, 9], borderColor: '#f43f5e', backgroundColor: 'rgba(244, 63, 94, 0.1)', fill: true, tension: 0.4, borderDash: [5, 5] }
                ] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } } } 
            }
        });

        // Gráfico Radar Temuco
        const chartTemuco = new Chart(document.getElementById('temucoChart'), {
            type: 'bar',
            data: { labels: ['Temuco', 'Villarrica', 'Pucón'], datasets: [{ data: [44, 12, 8], backgroundColor: '#a855f7', borderRadius: 5 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // Función para cambiar las vistas
        function cambiarVista(vista) {
            const modAds = document.getElementById('modulo-ads');
            const modRadar = document.getElementById('modulo-radar');
            const grid = document.getElementById('main-grid');
            const btnAds = document.getElementById('btn-ads');
            const btnRadar = document.getElementById('btn-radar');
            const btnDual = document.getElementById('btn-dual');

            [btnAds, btnRadar, btnDual].forEach(btn => {
                btn.classList.remove('btn-active');
                btn.classList.add('btn-inactive');
            });

            if (vista === 'ads') {
                modAds.style.display = 'block'; modRadar.style.display = 'none';
                grid.className = 'grid grid-cols-1 gap-10 flex-grow';
                btnAds.classList.add('btn-active'); btnAds.classList.remove('btn-inactive');
            } else if (vista === 'radar') {
                modAds.style.display = 'none'; modRadar.style.display = 'block';
                grid.className = 'grid grid-cols-1 gap-10 flex-grow';
                btnRadar.classList.add('btn-active'); btnRadar.classList.remove('btn-inactive');
            } else if (vista === 'dual') {
                modAds.style.display = 'block'; modRadar.style.display = 'block';
                grid.className = 'grid grid-cols-1 lg:grid-cols-2 gap-10 flex-grow';
                btnDual.classList.add('btn-active'); btnDual.classList.remove('btn-inactive');
            }
        }
    </script>
</body>
</html>
